<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); }
        #status { color: #888; font-size: 14px; min-height: 20px; }
        #result { font-size: 14px; word-break: break-all; }
        #reader { max-width: 100%; margin: 16px auto; }
    </style>
</head>
<body>

    <h2>Сканер QR-кодов</h2>
    <p id="status">Запуск камеры...</p>
    <p id="result"></p>
    <div id="reader" hidden></div>

    <script>
        const tg = window.Telegram?.WebApp;
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
        const readerEl = document.getElementById('reader');

        const MOBILE_PLATFORMS = new Set(['android', 'ios', 'android_x']);

        if (tg) {
            tg.ready();
            tg.expand();
        } else {
            statusEl.textContent = 'Откройте через кнопку «📷 Сканировать QR» внизу экрана.';
        }

        let html5Scanner = null;
        let sending = false;

        function supportsNativeScanner() {
            return tg
                && typeof tg.showScanQrPopup === 'function'
                && MOBILE_PLATFORMS.has(tg.platform)
                && (tg.isVersionAtLeast(6.4) || tg.isVersionAtLeast('6.4'));
        }

        function sendResult(text) {
            if (sending) return;

            const url = text.trim();
            if (!url) return;

            sending = true;
            resultEl.textContent = url;
            statusEl.textContent = 'Отправка ссылки боту...';

            if (!tg || typeof tg.sendData !== 'function') {
                statusEl.textContent = 'Ошибка: нажмите /start и откройте кнопку «📷 Сканировать QR» внизу экрана.';
                sending = false;
                return;
            }

            try {
                tg.sendData(url);
            } catch (err) {
                statusEl.textContent = 'Ошибка sendData: ' + err.message;
                sending = false;
                return;
            }

            statusEl.textContent = 'Ссылка отправлена, ожидайте ответ бота...';

            // sendData работает только при открытии через reply-кнопку внизу экрана.
            setTimeout(() => {
                if (sending) {
                    statusEl.textContent =
                        'Ссылка не ушла. Нажмите /start и откройте кнопку «📷 Сканировать QR» внизу экрана (не кнопку в сообщении).';
                    sending = false;
                }
            }, 3000);
        }

        function startNativeScanner() {
            statusEl.textContent = 'Наведите камеру на QR-код';

            tg.showScanQrPopup({ text: 'Наведите камеру на QR-код' }, (text) => {
                if (!text) return;
                tg.closeScanQrPopup();
                sendResult(text);
                return true;
            });
        }

        async function stopWebScanner() {
            if (!html5Scanner) return;
            try {
                await html5Scanner.stop();
            } catch (_) {}
            html5Scanner = null;
            readerEl.hidden = true;
        }

        async function startWebScanner() {
            if (!navigator.mediaDevices?.getUserMedia) {
                throw new Error('Браузер не поддерживает доступ к камере.');
            }

            const cameras = await Html5Qrcode.getCameras();
            if (!cameras.length) {
                throw new Error('Камера не найдена на устройстве.');
            }

            const camera = cameras.find((c) => /back|rear|environment/i.test(c.label)) || cameras.at(-1);

            readerEl.hidden = false;
            statusEl.textContent = 'Наведите камеру на QR-код';

            html5Scanner = new Html5Qrcode('reader');
            await html5Scanner.start(
                camera.id,
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async (text) => {
                    await stopWebScanner();
                    sendResult(text);
                },
                () => {}
            );
        }

        async function startScanner() {
            try {
                if (supportsNativeScanner()) {
                    startNativeScanner();
                    return;
                }

                if (tg && !MOBILE_PLATFORMS.has(tg.platform)) {
                    statusEl.textContent = 'Открываем камеру устройства...';
                }

                await startWebScanner();
            } catch (err) {
                await stopWebScanner();
                statusEl.textContent = 'Ошибка: ' + err.message;
                sending = false;
            }
        }

        startScanner();
    </script>
</body>
</html>
